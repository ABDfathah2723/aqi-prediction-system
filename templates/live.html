<!DOCTYPE html>
<html>

<head>

    <title>Live AQI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#0f2027;
            color:white;
        }

        .card{
            background:#203a43;
            padding:20px;
            border-radius:15px;
            margin-top:40px;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card">

        <h1>🌍 Live Pollution Data</h1>

        <h3>City: {{ city }}</h3>

        <hr>

        <p>CO : {{ pollution.co }}</p>

        <p>NO : {{ pollution.no }}</p>

        <p>NO2 : {{ pollution.no2 }}</p>

        <p>O3 : {{ pollution.o3 }}</p>

        <p>SO2 : {{ pollution.so2 }}</p>

        <p>PM2.5 : {{ pollution.pm2_5 }}</p>

    </div>

</div>

</body>
</html>
