{% extends 'base.html' %}

{% block title %}Performance Analysis{% endblock %}

{% block content %}

<div class="custom-card">

    <h1 class="mb-4">
        📊 Performance Analysis
    </h1>

    <table class="table table-striped table-hover">

        <thead class="table-dark">

            <tr>

                <th>Algorithm</th>

                <th>Accuracy</th>

                <th>Precision</th>

                <th>Recall</th>

                <th>F1 Score</th>

            </tr>

        </thead>

        <tbody>

            <tr>

                <td>Decision Tree</td>

                <td>89%</td>

                <td>88%</td>

                <td>87%</td>

                <td>87%</td>

            </tr>

            <tr>

                <td>KNN</td>

                <td>85%</td>

                <td>84%</td>

                <td>83%</td>

                <td>83%</td>

            </tr>

            <tr>

                <td>Random Forest</td>

                <td>95%</td>

                <td>94%</td>

                <td>94%</td>

                <td>94%</td>

            </tr>

        </tbody>

    </table>

</div>

<br>

<div class="custom-card">

    <h2>📈 Accuracy Comparison</h2>

    <img class="graph-img"
    src="{{ url_for('static', filename='graphs/accuracy_comparison.png') }}">

</div>

{% endblock %}
