<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}AQI Prediction{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container">

            <a class="navbar-brand" href="/">
                🌍 Air Quality
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">

                        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">

                            Home

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link {% if request.path == '/dashboard' %}active{% endif %}" href="/dashboard">

                            Dashboard

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link {% if request.path == '/dataset' %}active{% endif %}" href="/dataset">

                        Dataset

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link {% if request.path == '/history' %}active{% endif %}" href="/history">

                            History

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link {% if request.path == '/performance' %}active{% endif %}" href="/performance">

                            Performance

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link {% if request.path == '/about' %}active{% endif %}" href="/about">

                        About

                        </a>

                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- MAIN CONTENT -->

    <div class="main-content">

        {% block content %}

        {% endblock %}

    </div>

    <!-- FOOTER -->

    <footer class="footer">

        <div class="container">

            <div class="row">

                <div class="col-md-4">

                    <h3>🌍 Air Quality</h3>

                    <p>
                        Machine Learning based AQI Prediction System.
                    </p>

                </div>

                <div class="col-md-4">

                    <h4>Quick Links</h4>

                    <ul>

                        <li><a href="/">Home</a></li>

                        <li><a href="/dashboard">Dashboard</a></li>

                        <li><a href="/history">History</a></li>

                    </ul>

                </div>

                <div class="col-md-4">

                    <h4>Contact</h4>

                    <p>Email: aqi@gmail.com</p>

                    <p>Phone: +91 9876543210</p>

                </div>

            </div>

        </div>

    </footer>

</body>

</html>
